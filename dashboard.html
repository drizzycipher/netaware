   /* Circular progress styles */
.vuln-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  justify-content: center;
}

.circle-wrap {
  width: 48px;
  height: 48px;
  position: relative;
  display: inline-block;
}

.circle-bg {
  fill: none;
  stroke: rgba(3,202,228,0.12);
  stroke-width: 5;
}

.circle-progress {
  fill: none;
  stroke-width: 5;
  stroke-linecap: round;
  transform: rotate(-90deg);
  transform-origin: 50% 50%;
  transition: stroke-dashoffset 0.8s ease;
}

.progress-text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 0.75rem;
  font-weight: 700;
  color: #04474f;
}

document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".vuln-card").forEach(card => {
    const moduleKey = card.dataset.module;
    const progress = moduleData[moduleKey]?.progress || 0;

    const circle = card.querySelector(".circle-progress");
    const text = card.querySelector(".progress-text");

    const radius = 15.915;
    const circumference = 2 * Math.PI * radius;
    circle.style.strokeDasharray = `${circumference} ${circumference}`;
    circle.style.strokeDashoffset = circumference;

    const offset = circumference - (progress / 100) * circumference;
    circle.style.strokeDashoffset = offset;
    text.textContent = `${progress}%`;

    if (progress >= 80) card.querySelector(".circle-wrap").classList.add("glow");
  });
});

const STORAGE_KEY = 'learning_module_state';

function loadSavedState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    return JSON.parse(raw);
  } catch (e) { return {}; }
}

function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
}

let moduleState = loadSavedState(); // { [moduleKey]: { completed: [0,1], simulationDone: false, currentIndex: 0, answers: { "0": "answer" } } }

// ensure every module has an entry
Object.keys(moduleData).forEach(k => {
  if (!moduleState[k]) moduleState[k] = { completed: [], simulationDone: false, currentIndex: 0, answers: {} };
  // ensure fields exist if older saved state lacks them
  if (!Array.isArray(moduleState[k].completed)) moduleState[k].completed = [];
  if (typeof moduleState[k].simulationDone !== 'boolean') moduleState[k].simulationDone = false;
  if (typeof moduleState[k].currentIndex !== 'number') moduleState[k].currentIndex = 0;
  if (typeof moduleState[k].answers !== 'object' || moduleState[k].answers === null) moduleState[k].answers = {};

  // also populate moduleData progress initial from saved state or existing progress
  moduleData[k].progress = moduleData[k].progress || 0;
  // if saved simulation was done, mark progress 100
  if (moduleState[k].simulationDone) moduleData[k].progress = 100;
 else {
  // compute lesson-based progress (snap to 25, 50, 80)
  const completedCount = (moduleState[k].completed || []).length;
  const total = (moduleData[k].lessons || []).length || 1;
  let lessonProgress = Math.round((completedCount / total) * 80);

  // snap to your clean milestone values
  if (lessonProgress >= 20 && lessonProgress < 37) lessonProgress = 25;
  else if (lessonProgress >= 37 && lessonProgress < 65) lessonProgress = 50;
  else if (lessonProgress >= 65) lessonProgress = 80;
  else lessonProgress = 0; // nothing done yet

  moduleData[k].progress = lessonProgress;
}

// call once to sync sidebar visuals after page load
function refreshSidebarProgress(moduleKey) {
  const card = document.querySelector(`.vuln-card[data-module="${moduleKey}"]`);
  if (!card) return;

  const progress = moduleData[moduleKey]?.progress ?? 0;
  const circle = card.querySelector(".circle-progress"); // ensure this is the <circle> element inside the SVG
  const text = card.querySelector(".progress-text");
  if (!circle || !text) return;

  const radius = 15.915;
  const circumference = 2 * Math.PI * radius;

  // Use setProperty to avoid CSS specificity issues
  circle.style.setProperty('stroke-dasharray', `${circumference} ${circumference}`);
  const offset = circumference - (progress / 100) * circumference;
  circle.style.setProperty('stroke-dashoffset', String(offset));

  text.textContent = `${progress}%`;

  const glowWrap = card.querySelector(".circle-wrap");
  if (glowWrap) {
    glowWrap.classList.toggle("glow", progress >= 80);
  }
}

function refreshAllSidebarProgress() {
  Object.keys(moduleData).forEach(k => refreshSidebarProgress(k));
}

// Mark a lesson completed and recompute progress (lessons contribute up to 80%)
function markLessonCompleted(moduleKey, lessonIndex) {
  if (!moduleData[moduleKey]) return;
  const total = (moduleData[moduleKey].lessons || []).length || 1;
  const state = moduleState[moduleKey] || { completed: [], simulationDone: false, currentIndex: 0, answers: {} };

  if (!state.completed.includes(lessonIndex)) {
    state.completed.push(lessonIndex);
    state.completed = Array.from(new Set(state.completed)).sort((a, b) => a - b);
    moduleState[moduleKey] = state;

    // compute and snap lesson progress
    const completedCount = state.completed.length;
    let lessonProgress = Math.round((completedCount / total) * 80);

    // snap to 25, 50, or 80
    if (lessonProgress >= 20 && lessonProgress < 37) lessonProgress = 25;
    else if (lessonProgress >= 37 && lessonProgress < 65) lessonProgress = 50;
    else if (lessonProgress >= 65) lessonProgress = 80;

    moduleData[moduleKey].progress = lessonProgress;
    saveState(moduleState);
    refreshSidebarProgress(moduleKey);
  }
}


// Mark simulation completed (gives the final 20% so progress => 100)
function markSimulationCompleted(moduleKey) {
  if (!moduleData[moduleKey]) return;
  const state = moduleState[moduleKey] || { completed: [], simulationDone: false, currentIndex: 0, answers: {} };
  state.simulationDone = true;
  moduleState[moduleKey] = state;
  moduleData[moduleKey].progress = 100;
  saveState(moduleState);
  refreshSidebarProgress(moduleKey);
}

// ---------- Main renderer (single, cleaned) ----------
function renderModule(key) {
  const data = moduleData[key];
  if (!data) return console.warn('No module data for key:', key);

  const container = document.getElementById("moduleContent");
  if (!container) return console.error('Container #moduleContent not found in DOM.');

  // keep local index, initialize from saved state for this module (persist last-opened lesson)
  let currentIndex = (moduleState[key] && typeof moduleState[key].currentIndex === 'number') ? moduleState[key].currentIndex : 0;

  // show lesson by index
  function showLesson(index) {
    // clamp
    if (index < 0) index = 0;
    if (index >= data.lessons.length) return showSimulationSlide();

    currentIndex = index;

    // Save current index so it persists across reloads/close-open
    try {
      moduleState[key] = moduleState[key] || { completed: [], simulationDone: false, currentIndex: 0, answers: {} };
      moduleState[key].currentIndex = currentIndex;
      saveState(moduleState);
    } catch (e) {
      console.warn('Could not save current index', e);
    }

    const lesson = data.lessons[index];

    container.innerHTML = ""; // clear

    // Title & meta
    const titleEl = document.createElement('h4');
    titleEl.textContent = `${data.title} — ${lesson.title} (${index + 1}/${data.lessons.length})`;
    container.appendChild(titleEl);

    // Lesson box
    const box = document.createElement('div');
    box.className = 'lesson-box';

    // paragraphs
    const p1 = document.createElement('p'); p1.textContent = lesson.p1 || '';
    const p2 = document.createElement('p'); p2.textContent = lesson.p2 || '';
    box.appendChild(p1);
    box.appendChild(p2);

    // bullets
    if (lesson.bullets && lesson.bullets.length) {
      const ul = document.createElement('ul');
      lesson.bullets.forEach(b => {
        const li = document.createElement('li');
        li.textContent = b;
        ul.appendChild(li);
      });
      box.appendChild(ul);
    }

    // image (if any)
    if (lesson.img) {
      const img = document.createElement('img');
      img.src = lesson.img;
      img.alt = lesson.imgAlt || '';
      img.className = 'lesson-image';
      box.appendChild(img);
      if (lesson.imgCaption) {
        const cap = document.createElement('p');
        cap.className = 'caption';
        cap.innerHTML = lesson.imgCaption;
        box.appendChild(cap);
      }
    }

    // analogy
    if (lesson.analogy) {
      const an = document.createElement('p');
      an.style.fontStyle = 'bold';
      an.textContent = `Analogy: ${lesson.analogy}`;
      box.appendChild(an);
    }

    // REFERENCES (New Section)
    if (lesson.references && lesson.references.length) {
      const refDiv = document.createElement('div');
      refDiv.style.marginTop = '20px';
      refDiv.style.paddingTop = '10px';
      refDiv.style.borderTop = '1px solid #eee';
      
      const refHeader = document.createElement('h6');
      refHeader.textContent = 'References:';
      refHeader.style.fontSize = '0.9rem';
      refHeader.style.fontWeight = 'bold';
      refHeader.style.marginBottom = '5px';
      refDiv.appendChild(refHeader);

      const refUl = document.createElement('ul');
      refUl.style.fontSize = '0.85rem';
      refUl.style.marginBottom = '0';
      refUl.style.paddingLeft = '20px';
      
      lesson.references.forEach(r => {
        const li = document.createElement('li');
        // Automatically makes links clickable if they start with http
        if (r.startsWith('http')) {
            const a = document.createElement('a');
            a.href = r;
            a.textContent = r;
            a.target = '_blank';
            a.style.color = '#03cae4'; 
            li.appendChild(a);
        } else {
            li.innerHTML = r;
        }
        refUl.appendChild(li);
      });
      refDiv.appendChild(refUl);
      box.appendChild(refDiv);
    }

    // QUESTION block (if present)
    let nextBtnRef; // reference to next button (so check handler can enable it)
    if (lesson.question) {
      const qWrap = document.createElement('div');
      qWrap.className = 'mt-4 p-3 border rounded';
      qWrap.style.background = '#f7fdff';

      const qText = document.createElement('p');
      qText.innerHTML = `<strong>Question:</strong> ${lesson.question}`;
      qWrap.appendChild(qText);

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'form-control mb-2';
      input.placeholder = 'Type your answer here...';
      qWrap.appendChild(input);

      const checkBtn = document.createElement('button');
      checkBtn.className = 'btn btn-outline-primary btn-smi';
      checkBtn.textContent = 'Check Answer';
      qWrap.appendChild(checkBtn);

      const feedback = document.createElement('div');
      feedback.className = 'mt-2 fw-semibold';
      qWrap.appendChild(feedback);

      box.appendChild(qWrap);

      // store references for later wiring
      box._q = { input, checkBtn, feedback, correct: (lesson.answer || '').toString().trim().toLowerCase() };
    }

    // navigation row
    const nav = document.createElement('div');
    nav.className = 'd-flex justify-content-between mt-4';

    // prev
    const prevBtn = document.createElement('button');
    prevBtn.className = 'btn btn-secondaryy';
    prevBtn.textContent = '← Previous';
    prevBtn.disabled = index === 0;
    prevBtn.addEventListener('click', () => {
      if (index > 0) showLesson(index - 1);
    });
    nav.appendChild(prevBtn);

    // next
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn btn-next';
    nextBtn.textContent = index === data.lessons.length - 1 ? 'Next: Simulation →' : 'Next Lesson →';
    nextBtn.addEventListener('click', () => {
      if (index < data.lessons.length - 1) showLesson(index + 1);
      else showSimulationSlide();
    });
    if (lesson.question) nextBtn.disabled = true;
    nav.appendChild(nextBtn);

    // append nav & box to container
    container.appendChild(box);
    container.appendChild(nav);

    // Now wire question check (if present)
    if (box._q) {
      const { input, checkBtn, feedback, correct } = box._q;

      // --- RESTORE previously saved answer if any ---
      try {
        const savedAnswer = moduleState[key] && moduleState[key].answers ? moduleState[key].answers[String(index)] : undefined;
        const lessonCompleted = moduleState[key] && Array.isArray(moduleState[key].completed) && moduleState[key].completed.includes(index);
        if (savedAnswer !== undefined) {
          input.value = savedAnswer;
        }
        // If lesson was previously completed, mark as correct UI-wise immediately
        if (lessonCompleted) {
          feedback.textContent = '✅ Correct! You may proceed.';
          feedback.style.color = 'green';
          nextBtn.disabled = false;
        }
      } catch (e) {
        console.warn('Could not restore saved answer', e);
      }

      checkBtn.addEventListener('click', () => {
        const val = (input.value || '').trim().toLowerCase();
        if (!val) {
          feedback.textContent = 'Please type an answer.';
          feedback.style.color = '#a63';
          nextBtn.disabled = true;
          return;
        }
        if (val === correct) {
          feedback.textContent = '✅ Correct! You may proceed.';
          feedback.style.color = 'green';
          nextBtn.disabled = false;

          // ✅ record completion for progress tracking
          try {
            // save the typed answer for restore later
            moduleState[key] = moduleState[key] || { completed: [], simulationDone: false, currentIndex: 0, answers: {} };
            moduleState[key].answers[String(index)] = input.value.trim();
            saveState(moduleState);
          } catch (e) {
            console.warn('Could not save answer', e);
          }

          try {
            markLessonCompleted(key, index);
          } catch (e) {
            console.warn('Could not mark lesson complete', e);
          }

        } else {
          feedback.textContent = '❌ Incorrect. Try again!';
          feedback.style.color = 'red';
          nextBtn.disabled = true;

          // Save attempted answer so user doesn't lose typing on reload (optional)
          try {
            moduleState[key] = moduleState[key] || { completed: [], simulationDone: false, currentIndex: 0, answers: {} };
            moduleState[key].answers[String(index)] = input.value.trim();
            saveState(moduleState);
          } catch (e) {
            console.warn('Could not save attempted answer', e);
          }
        }
      });

      input.addEventListener('keyup', (e) => {
        if (e.key === 'Enter') checkBtn.click();
      });
    }
  }


  // simulation-ready slide
  function showSimulationSlide() {
    container.innerHTML = '';

    const h4 = document.createElement('h4');
    h4.textContent = `${data.title} — Simulation Ready`;
    container.appendChild(h4);

    const desc = document.createElement('p');
    desc.style.color = '#4f656c';
    desc.style.textAlign = 'center';
    desc.textContent = "You're ready to put your knowledge into practice! Click the button below to start the safe simulation.";
    container.appendChild(desc);

    const summary = document.createElement('div');
    summary.className = 'lesson-box';
    summary.innerHTML = '<h5>Quick Summary</h5>';
    const ul = document.createElement('ul');

    if (data.quickActivity?.instructions) {
      const actLi = document.createElement('li');
      actLi.innerHTML = `<b>Quick Activity — ${data.quickActivity.title}:</b>`;
      const nested = document.createElement('ul');
      data.quickActivity.instructions.forEach(step => {
        const li = document.createElement('li');
        li.textContent = step;
        nested.appendChild(li);
      });
      if (data.quickActivity.note) {
        const noteLi = document.createElement('li');
        noteLi.textContent = data.quickActivity.note;
        noteLi.style.fontStyle = 'italic';
        nested.appendChild(noteLi);
      }
      actLi.appendChild(nested);
      ul.appendChild(actLi);
    }

    if (data.keyTakeaways) {
      const tLi = document.createElement('li');
      tLi.innerHTML = `<b>Key Takeaways:</b>`;
      const nested = document.createElement('ul');
      data.keyTakeaways.forEach(t => {
        const li = document.createElement('li');
        li.textContent = t;
        nested.appendChild(li);
      });
      tLi.appendChild(nested);
      ul.appendChild(tLi);
    }

    if (data.forParentsTeachers) {
      const pLi = document.createElement('li');
      pLi.innerHTML = `<b>Why It Matters:</b> ${data.forParentsTeachers.short}`;
      const nested = document.createElement('ul');
      data.forParentsTeachers.tips.forEach(t => {
        const li = document.createElement('li');
        li.textContent = t;
        nested.appendChild(li);
      });
      pLi.appendChild(nested);
      ul.appendChild(pLi);
    }

    if (data.glossary) {
      const gLi = document.createElement('li');
      gLi.innerHTML = `<b>Glossary:</b>`;
      const nested = document.createElement('ul');
      data.glossary.forEach(g => {
        const li = document.createElement('li');
        li.innerHTML = `<b>${g.term}:</b> ${g.def}`;
        nested.appendChild(li);
      });
      gLi.appendChild(nested);
      ul.appendChild(gLi);
    }

    summary.appendChild(ul);
    container.appendChild(summary);

    const controls = document.createElement('div');
    controls.style.display = 'flex';
    controls.style.justifyContent = 'space-between';
    controls.style.marginTop = '12px';

    const backBtn = document.createElement('button');
    backBtn.className = 'btn-next';
    backBtn.textContent = '← Back to Last Lesson';
    backBtn.addEventListener('click', () => showLesson(data.lessons.length - 1));
    controls.appendChild(backBtn);

    const startBtn = document.createElement('button');
    startBtn.className = 'btn-sim';
    startBtn.textContent = 'Start Simulation';
    startBtn.addEventListener('click', () => {
  const mapByKey = {
    sql: 'sqlinjection.html',
    phishing: 'phishatk.html',
    adattack: 'adatk.html',
    weakpw: 'tryweak.html',
    bruteforce: 'bruteforce.php',
    xss: 'xssatk.html'
  };


  const target = mapByKey[key] || 'index.html';
  window.location.href = target;
});

    controls.appendChild(startBtn);

    container.appendChild(controls);
  }

  // show saved (or default) lesson index on first render
  // clamp index bounds
  if (currentIndex < 0) currentIndex = 0;
  if (currentIndex >= data.lessons.length) currentIndex = 0;

  showLesson(currentIndex);

}
</script>
</body>
</html>
